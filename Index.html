<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Sveglia Duty</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #2196F3; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #2196F3; color: white; border: none; cursor: pointer; }
        button:hover { background: #1976D2; }
        .result { background: #e8f5e8; padding: 15px; border-radius: 8px; margin: 10px 0; font-size: 18px; font-weight: bold; }
        .result time { display: block; color: #2E7D32; }
        #events { margin-top: 20px; }
        .event { background: white; padding: 10px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #2196F3; }
        #loader { text-align: center; color: #666; }
    </style>
</head>
<body>
    <h1>🛫 Calcolatore Sveglia Duty</h1>
    
    <label>Orario inizio duty (HH:MM):</label>
    <input type="time" id="dutyTime" value="06:00">
    
    <button onclick="calcola()">Calcola Orari</button>
    
    <div id="results"></div>
    
    <button onclick="impostaSveglia()" id="alarmBtn" style="display:none;">🚨 Imposta Sveglia Telefono</button>
    
    <div id="loader" style="display:none;">Caricamento eventi calendario...</div>
    <div id="events"></div>
    
    <button onclick="loadEvents()" style="background:#4CAF50;margin-top:20px;">📅 Carica da Google Calendar</button>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
