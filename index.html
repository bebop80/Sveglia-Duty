<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcolatore Sveglia Duty</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2196F3" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #2196f3;
      --primary-dark: #1976d2;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    h1 {
      text-align: center;
      margin: 0 0 8px;
      font-size: 28px;
      color: var(--primary-dark);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 15px;
    }

    input, button, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      background: #fff;
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }

    button.secondary {
      background: #eef2ff;
      color: #1d4ed8;
      border: 1px solid #c7d2fe;
    }

    button.ghost {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .results {
      display: none;
      background: var(--success-bg);
      border: 1px solid #bbf7d0;
      border-radius: 14px;
      padding: 14px;
      margin-top: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px dashed #cfe8d5;
    }

    .row:last-child { border-bottom: none; }

    .label { font-weight: 700; color: #166534; }

    .time {
      font-size: 24px;
      font-weight: 800;
      color: var(--success-text);
    }

    .events {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .event-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .event-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .event-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      margin-top: 10px;
    }

    @media (max-width: 520px) {
      .grid-2 { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .time { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Calcolatore Sveglia Duty</h1>
      <p class="subtitle">Stessa interfaccia su PC e mobile, senza service worker.</p>

      <label for="dutyTime">Orario inizio duty</label>
      <input type="time" id="dutyTime" value="06:00" />

      <div class="grid-2">
        <div>
          <label for="prepBeforeDuty">Minuti prima del duty</label>
          <input type="number" id="prepBeforeDuty" value="10" min="0" />
        </div>
        <div>
          <label for="travelMinutes">Minuti tragitto auto</label>
          <input type="number" id="travelMinutes" value="15" min="0" />
        </div>
      </div>

      <label for="alarmAdvance">Minuti prima dell'uscita di casa</label>
      <input type="number" id="alarmAdvance" value="35" min="0" />

      <button id="calcBtn" type="button">Calcola orari</button>

      <div id="results" class="results">
        <div class="row">
          <div class="label">Presentazione</div>
          <div class="time" id="presentazioneOut">--:--</div>
        </div>
        <div class="row">
          <div class="label">Uscita di casa</div>
          <div class="time" id="uscitaOut">--:--</div>
        </div>
        <div class="row">
          <div class="label">Sveglia</div>
          <div class="time" id="svegliaOut">--:--</div>
        </div>
      </div>

      <button id="copyAlarmBtn" class="secondary" type="button" style="display:none;">Copia orario sveglia</button>
      <button id="androidAlarmBtn" class="ghost" type="button" style="display:none;">Apri app Orologio</button>
    </div>

    <div class="card">
      <label>Google Calendar</label>
      <button id="authorize_button" class="secondary" type="button" style="display:none;">Collega Google Calendar</button>
      <button id="signout_button" class="ghost" type="button" style="display:none;">Disconnetti</button>

      <div id="calendarStatus" class="status">Google Calendar non collegato.</div>
      <div id="events" class="events"></div>

      <div class="warning">
        Inserisci Client ID e API Key in app.js. Se vuoi solo il calcolo manuale, puoi ignorare questa parte.
      </div>
    </div>
  </div>

  <script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
  <script src="./app.js"></script>
</body>
</html>
